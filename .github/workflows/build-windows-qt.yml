name: Build Windows Qt Wallet

on:
  push:
    branches:
      - release*
  workflow_dispatch:

jobs:
  windows-qt:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            bison
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-qt5
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-protobuf
            mingw-w64-x86_64-db

      - name: Ensure Qt build tools
        run: pacman -S --needed --noconfirm mingw-w64-x86_64-qt5-base mingw-w64-x86_64-qt5-tools mingw-w64-x86_64-qt5-svg

      - name: Build raven-qt
        run: ./.github/scripts/build-windows-qt-msys2.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-qt
          path: release/*-win64-qt.zip
